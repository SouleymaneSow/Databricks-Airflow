version: "3.8"

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.8.0
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/data:/opt/airflow/data
      - ./airflow/requirements.txt:/requirements.txt
    command: >
      bash -c "pip install --no-cache-dir -r /requirements.txt &&
               airflow db migrate &&
               if airflow users list | grep -E '(^|[[:space:]])admin([[:space:]]|$)' >/dev/null 2>&1; then
                 echo 'Admin user already exists';
               else
                 airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com;
               fi &&
               if [ -n \"$$DATABRICKS_HOST\" ] && [ -n \"$$DATABRICKS_TOKEN\" ]; then
                 DATABRICKS_HOST_CLEAN=$${DATABRICKS_HOST#https://};
                 DATABRICKS_HOST_CLEAN=$${DATABRICKS_HOST_CLEAN#http://};
                 airflow connections delete databricks_default >/dev/null 2>&1 || true;
                 airflow connections add databricks_default --conn-type databricks --conn-host \"$$DATABRICKS_HOST_CLEAN\" --conn-password \"$$DATABRICKS_TOKEN\";
                 echo 'Configured databricks_default from DATABRICKS_HOST and DATABRICKS_TOKEN';
               else
                 echo 'Skipped databricks_default setup: set DATABRICKS_HOST and DATABRICKS_TOKEN in .env';
               fi"

  airflow-webserver:
    image: apache/airflow:2.8.0
    depends_on:
      - airflow-init
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/data:/opt/airflow/data
      - ./airflow/requirements.txt:/requirements.txt
    ports:
      - "8080:8080"
    command: >
      bash -c "pip install --no-cache-dir -r /requirements.txt &&
               airflow webserver"

  airflow-scheduler:
    image: apache/airflow:2.8.0
    depends_on:
      - airflow-init
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/data:/opt/airflow/data
      - ./airflow/requirements.txt:/requirements.txt
    command: >
      bash -c "pip install --no-cache-dir -r /requirements.txt &&
               airflow scheduler"

volumes:
  postgres-db-volume:
